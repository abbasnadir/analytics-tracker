<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetricFlow SDK Example</title>
  </head>
  <body>
    <button id="cta">Track CTA</button>

    <script
      async
      src="../dist/metricflow.js"
      data-mf-token="mf_demo_key"
      data-mf-endpoint="http://localhost:4000/api/v1/events"
      data-mf-auto-track="true"
      data-mf-scroll="true"
      data-mf-perf="true"
    ></script>
    <script>
      document.getElementById("cta").addEventListener("click", function () {
        mf("track", "cta_clicked", { source: "example-page" });
      });
    </script>
  </body>
</html>
